name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 - Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'

      # Step 3 - Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4 - Generate Prisma client
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Step 5 - Lint check
      - name: Lint
        run: npm run lint

      # Step 6 - Build
      - name: Build
        run: npm run build

      # Step 7 - Run test
      - name: Run test
        run: npm test -- --passWithNoTests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      # Step 8 - Test coverage
      - name: Test coverage
        run: npm run test:cov -- --passWithNoTests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      # Step 9 - Build Docker image
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/nestjs-demo:latest .

      # Step 10 - Login to Docker Hub
      - name: Login to Docker Hub
        # Only login and push on main branch, not PRs
        if: github.ref == 'refs/heads/main'
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      # Step 11 - Push to Docker Hub
      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/nestjs-demo:latest

      # Step 11 - Trigger Railway Redeploy
      - name: Trigger Railway Redeploy
        if: github.ref == 'refs/heads/main'
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceRedeploy(environmentId: \"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\", serviceId: \"${{ secrets.RAILWAY_SERVICE_ID }}\") }"
            }' \
            https://backboard.railway.app/graphql/v2
